name: CI CD Pipeline with Approval Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/salesken-app:${{ env.IMAGE_TAG }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/salesken-app:${{ env.IMAGE_TAG }} ${{ secrets.DOCKER_USERNAME }}/salesken-app:latest

      - name: Test Docker image
        run: |
          docker run -d --name test-app -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/salesken-app:${{ env.IMAGE_TAG }}
          sleep 5
          docker ps | grep test-app
          docker stop test-app
          docker rm test-app

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/salesken-app:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/salesken-app:latest

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Deploy to staging
        run: |
          echo "Deploying to STAGING"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/salesken-app:${{ env.IMAGE_TAG }}"
          echo "Environment: ${{ vars.DEPLOY_ENV }}"
          echo "Port: ${{ vars.APP_PORT }}"
          echo "Staging deployment complete"

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Deploy to production
        run: |
          echo "Deploying to PRODUCTION"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/salesken-app:${{ env.IMAGE_TAG }}"
          echo "Environment: ${{ vars.DEPLOY_ENV }}"
          echo "Port: ${{ vars.APP_PORT }}"
          echo "Production deployment complete" 
