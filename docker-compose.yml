services:

    app:
      build : .
      container_name: salesken-app
      ports:
        - "5000:5000"
      environment:
        - DB_HOST=db
        - DB_NAME=salesken
        - DB_USER=postgres
        - DB_PASSWORD=secret
      
      depends_on:
        db:
          condition: service_healthy
      restart: unless-stopped

    db:
      image: postgres:15-alpine
      container_name: salesken-db
      environment:
        - POSTGRES_DB=salesken
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=secret
      volumes: 
        - pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL" , "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5
      restart: unless-stopped
volumes: 
    pgdata:

